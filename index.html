<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flow — Tasks</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#eef0f6;
    --bg-accent:#e3e7f5;
    --surface:#ffffff;
    --surface-2:#f4f5f9;
    --text:#181a2a;
    --text-muted:#6b7080;
    --border:#e6e8f0;
    --accent:#6c5ce7;
    --accent-soft:#efecfd;
    --accent-contrast:#ffffff;
    --success:#16a34a;
    --danger:#e0473c;
    --shadow: 0 20px 45px rgba(24,26,42,0.10), 0 2px 6px rgba(24,26,42,0.06);
  }
  html[data-theme="dark"]{
    --bg:#101118;
    --bg-accent:#161826;
    --surface:#191b26;
    --surface-2:#20222f;
    --text:#f2f2f7;
    --text-muted:#8d90a3;
    --border:#2a2d3d;
    --accent:#8b7cf6;
    --accent-soft:#26223f;
    --accent-contrast:#101118;
    --success:#4ade80;
    --danger:#f87171;
    --shadow: 0 20px 45px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.3);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 20% -10%, var(--bg-accent) 0%, var(--bg) 55%);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:24px 14px 70px;
    transition:background 0.25s ease, color 0.25s ease;
  }

  .app{
    width:100%;
    max-width:440px;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand .mark{
    width:34px; height:34px;
    border-radius:10px;
    background:var(--accent);
    display:flex; align-items:center; justify-content:center;
    color:var(--accent-contrast);
    font-weight:700;
    font-size:16px;
  }
  .brand h1{
    font-size:18px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.2px;
  }
  .brand .date{
    font-size:11px;
    color:var(--text-muted);
    margin-top:1px;
  }

  .icon-btn{
    width:38px; height:38px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:16px;
    transition:transform 0.15s ease, background 0.2s ease;
  }
  .icon-btn:active{ transform:scale(0.94); }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:16px;
    margin-bottom:14px;
    transition:background 0.25s ease, border-color 0.25s ease;
  }

  /* sync card */
  .sync-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .sync-dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--text-muted);
    flex-shrink:0;
    transition:background 0.2s ease;
  }
  .sync-dot.online{ background:var(--success); box-shadow:0 0 0 3px color-mix(in srgb, var(--success) 20%, transparent); }
  .sync-dot.offline{ background:var(--danger); }
  .sync-row input{
    flex:1;
    min-width:0;
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    border:none;
    background:transparent;
    color:var(--text);
    outline:none;
  }
  .sync-row input::placeholder{ color:var(--text-muted); font-weight:400; letter-spacing:0.5px; text-transform:none; }
  .pill-btn{
    font-family:inherit;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.3px;
    background:var(--surface-2);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:8px;
    padding:7px 10px;
    cursor:pointer;
    flex-shrink:0;
    transition:transform 0.15s ease;
  }
  .pill-btn.primary{
    background:var(--accent);
    color:var(--accent-contrast);
    border-color:var(--accent);
  }
  .pill-btn:active{ transform:scale(0.95); }
  .sync-note{
    font-size:11px;
    color:var(--text-muted);
    margin-top:8px;
    line-height:1.4;
  }

  /* add row */
  .add-row{
    display:flex;
    gap:8px;
  }
  .add-row input{
    flex:1;
    font-family:inherit;
    font-size:15px;
    padding:12px 14px;
    border:1px solid var(--border);
    border-radius:12px;
    background:var(--surface-2);
    color:var(--text);
    outline:none;
    transition:border-color 0.2s ease;
  }
  .add-row input:focus{ border-color:var(--accent); }
  .add-row button{
    font-family:inherit;
    font-weight:700;
    font-size:14px;
    background:var(--accent);
    color:var(--accent-contrast);
    border:none;
    border-radius:12px;
    padding:0 18px;
    cursor:pointer;
    transition:transform 0.15s ease;
  }
  .add-row button:active{ transform:scale(0.95); }

  /* filters */
  .filters{
    display:flex;
    gap:6px;
    margin:14px 0 4px;
  }
  .filters button{
    flex:1;
    font-family:inherit;
    font-size:12px;
    font-weight:600;
    background:transparent;
    color:var(--text-muted);
    border:1px solid var(--border);
    border-radius:10px;
    padding:8px 4px;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease;
  }
  .filters button.active{
    background:var(--accent-soft);
    color:var(--accent);
    border-color:var(--accent-soft);
  }

  /* list */
  ul#list{
    list-style:none;
    margin:0;
    padding:0;
  }
  #list li{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding:13px 4px;
    border-bottom:1px solid var(--border);
  }
  #list li:last-child{ border-bottom:none; }

  .check{
    flex-shrink:0;
    width:22px; height:22px;
    border-radius:50%;
    border:2px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    margin-top:1px;
    transition:background 0.2s ease, border-color 0.2s ease;
  }
  .check.done{
    background:var(--accent);
    border-color:var(--accent);
  }
  .check.done::after{
    content:"✓";
    color:var(--accent-contrast);
    font-size:12px;
    font-weight:700;
  }

  .item-body{ flex:1; min-width:0; }
  .item-text{
    font-size:15px;
    line-height:1.4;
    word-break:break-word;
  }
  .item-text.done{
    color:var(--text-muted);
    text-decoration:line-through;
    text-decoration-color:var(--text-muted);
  }
  .item-time{
    font-size:11px;
    color:var(--text-muted);
    margin-top:3px;
  }

  .del{
    flex-shrink:0;
    background:transparent;
    border:none;
    color:var(--text-muted);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    padding:2px 4px;
    border-radius:6px;
    transition:color 0.2s ease, background 0.2s ease;
  }
  .del:active{ background:var(--surface-2); color:var(--danger); }

  .empty{
    text-align:center;
    color:var(--text-muted);
    font-size:13px;
    padding:34px 10px;
  }

  /* footer stats + tools */
  .stats{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:var(--text-muted);
    margin-bottom:10px;
  }
  .stats strong{ color:var(--text); }

  .tools{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .tools button{
    flex:1;
    min-width:100px;
    font-family:inherit;
    font-size:11px;
    font-weight:600;
    background:var(--surface-2);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:10px;
    padding:9px 6px;
    cursor:pointer;
    transition:transform 0.15s ease;
  }
  .tools button:active{ transform:scale(0.96); }
  #import-input{ display:none; }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:var(--text-muted);
    margin-top:16px;
  }

  .toast{
    position:fixed;
    bottom:22px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--text);
    color:var(--bg);
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    padding:11px 18px;
    border-radius:12px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease;
    z-index:10;
    max-width:82vw;
    text-align:center;
    box-shadow:var(--shadow);
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  @media (prefers-reduced-motion: reduce){
    .toast, .icon-btn, .pill-btn, .add-row button, .tools button, .check{ transition:none; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="mark">F</div>
      <div>
        <h1>Flow</h1>
        <div class="date" id="today-date">—</div>
      </div>
    </div>
    <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">🌙</button>
  </div>

  <div class="card">
    <div class="sync-row">
      <span class="sync-dot offline" id="sync-dot"></span>
      <input type="text" id="room-code" placeholder="Room code" maxlength="12">
      <button class="pill-btn primary" id="join-btn">Join</button>
      <button class="pill-btn" id="new-room-btn">New</button>
    </div>
    <p class="sync-note" id="sync-status">Not connected — enter a room code to sync across devices.</p>
  </div>

  <div class="card">
    <div class="add-row">
      <input type="text" id="new-item" placeholder="Add a task…" maxlength="140" autocomplete="off">
      <button id="add-btn">Add</button>
    </div>

    <div class="filters">
      <button data-filter="all" class="active">All</button>
      <button data-filter="active">Open</button>
      <button data-filter="done">Done</button>
    </div>

    <ul id="list"></ul>
    <p class="empty" id="empty-msg" style="display:none;">Nothing here yet — add your first task above.</p>
  </div>

  <div class="card">
    <div class="stats">
      <span>Total <strong id="total-count">0</strong></span>
      <span>Done <strong id="done-count">0</strong></span>
      <span>Open <strong id="open-count">0</strong></span>
    </div>
    <div class="tools">
      <button id="export-btn">Export JSON</button>
      <button id="import-btn">Import JSON</button>
      <button id="clear-btn">Clear done</button>
    </div>
    <input type="file" id="import-input" accept="application/json">
  </div>

  <p class="footer-note">created by Shafeeq Barram</p>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ---------- Supabase config ---------- */
  var SUPABASE_URL = "https://kalswcsxlgaxfxkuaayg.supabase.co";
  var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthbHN3Y3N4bGdheGZ4a3VhYXlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxOTIyMzEsImV4cCI6MjA5ODc2ODIzMX0.R3WtT02XeBCuTuTZYb2jR83l80pwt9eWfRhP6tWrIBE";

  var sb = null;
  try{
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }catch(e){
    console.error("Supabase init failed:", e);
  }

  var LOCAL_KEY = "task_roll_db_v1";
  var ROOM_KEY = "task_roll_room_v1";
  var THEME_KEY = "task_roll_theme_v1";

  var state = {
    items: [],
    filter: "all",
    room: null,
    channel: null,
    online: false
  };

  /* ---------- theme ---------- */
  function applyTheme(theme){
    document.documentElement.setAttribute("data-theme", theme);
    var btn = document.getElementById("theme-toggle");
    if(btn) btn.textContent = theme === "light" ? "☀️" : "🌙";
    localStorage.setItem(THEME_KEY, theme);
  }
  function initTheme(){
    var saved = localStorage.getItem(THEME_KEY);
    if(!saved){
      saved = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    applyTheme(saved);
  }
  function toggleTheme(){
    var current = document.documentElement.getAttribute("data-theme") || "light";
    applyTheme(current === "light" ? "dark" : "light");
  }

  /* ---------- helpers ---------- */
  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
  }
  function randomRoom(){
    var letters = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    var s = "";
    for(var i=0;i<6;i++){ s += letters[Math.floor(Math.random()*letters.length)]; }
    return s;
  }
  function fmtTime(ts){
    var d = new Date(ts);
    var h = d.getHours(), m = d.getMinutes();
    var ampm = h >= 12 ? "PM" : "AM";
    h = h % 12; if(h === 0) h = 12;
    var mm = m < 10 ? "0"+m : m;
    return h + ":" + mm + " " + ampm;
  }
  function todayStr(){
    var d = new Date();
    var days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate();
  }
  function toast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._tid);
    toast._tid = setTimeout(function(){ t.classList.remove("show"); }, 1800);
  }
  function setSyncUI(){
    var dot = document.getElementById("sync-dot");
    var status = document.getElementById("sync-status");
    if(state.online && state.room){
      dot.className = "sync-dot online";
      status.textContent = "Synced live — room " + state.room + ". Share this code to sync other devices.";
    }else if(state.room){
      dot.className = "sync-dot offline";
      status.textContent = "Room set but not connected — check your connection.";
    }else{
      dot.className = "sync-dot offline";
      status.textContent = "Not connected — enter a room code to sync across devices.";
    }
  }

  /* ---------- local cache, keyed by room ---------- */
  function localKeyFor(room){ return LOCAL_KEY + ":" + (room || "local"); }
  function loadLocal(room){
    try{
      var raw = localStorage.getItem(localKeyFor(room));
      var parsed = raw ? JSON.parse(raw) : [];
      return Array.isArray(parsed) ? parsed : [];
    }catch(e){ return []; }
  }
  function saveLocal(room, items){
    try{ localStorage.setItem(localKeyFor(room), JSON.stringify(items)); }
    catch(e){ console.error("local cache save failed:", e); }
  }

  /* ---------- rendering ---------- */
  function visibleItems(){
    if(state.filter === "active") return state.items.filter(function(i){ return !i.done; });
    if(state.filter === "done") return state.items.filter(function(i){ return i.done; });
    return state.items;
  }

  function render(){
    var list = document.getElementById("list");
    var emptyMsg = document.getElementById("empty-msg");
    var items = visibleItems();

    list.innerHTML = "";
    emptyMsg.style.display = items.length === 0 ? "block" : "none";

    items.forEach(function(item){
      var li = document.createElement("li");

      var check = document.createElement("div");
      check.className = "check" + (item.done ? " done" : "");
      check.addEventListener("click", function(){ toggleDone(item.id); });

      var body = document.createElement("div");
      body.className = "item-body";

      var text = document.createElement("div");
      text.className = "item-text" + (item.done ? " done" : "");
      text.textContent = item.text;

      var time = document.createElement("div");
      time.className = "item-time";
      time.textContent = (item.done ? "Done " : "Added ") + fmtTime(item.done ? (item.doneAt || item.createdAt) : item.createdAt);

      body.appendChild(text);
      body.appendChild(time);

      var del = document.createElement("button");
      del.className = "del";
      del.setAttribute("aria-label", "Delete task");
      del.textContent = "×";
      del.addEventListener("click", function(){ removeItem(item.id); });

      li.appendChild(check);
      li.appendChild(body);
      li.appendChild(del);
      list.appendChild(li);
    });

    var total = state.items.length;
    var done = state.items.filter(function(i){ return i.done; }).length;
    var open = total - done;

    document.getElementById("total-count").textContent = total;
    document.getElementById("done-count").textContent = done;
    document.getElementById("open-count").textContent = open;

    saveLocal(state.room, state.items);
  }

  function sortItems(){
    state.items.sort(function(a,b){ return (b.createdAt||0) - (a.createdAt||0); });
  }

  /* ---------- mutations ---------- */
  function addItem(text){
    text = text.trim();
    if(!text) return;
    var item = { id: uid(), text: text, done: false, createdAt: Date.now(), doneAt: null };
    state.items.unshift(item);
    render();

    if(sb && state.room){
      sb.from("tasks").insert({
        id: item.id, room_code: state.room, text: item.text,
        done: item.done, created_at: item.createdAt, done_at: item.doneAt
      }).then(function(res){
        if(res.error){ console.error(res.error); toast("Sync error — saved locally only"); }
      });
    }
  }

  function toggleDone(id){
    var item = state.items.find(function(i){ return i.id === id; });
    if(!item) return;
    item.done = !item.done;
    item.doneAt = item.done ? Date.now() : null;
    render();

    if(sb && state.room){
      sb.from("tasks").update({ done: item.done, done_at: item.doneAt })
        .eq("id", item.id).eq("room_code", state.room)
        .then(function(res){ if(res.error) console.error(res.error); });
    }
  }

  function removeItem(id){
    state.items = state.items.filter(function(i){ return i.id !== id; });
    render();

    if(sb && state.room){
      sb.from("tasks").delete().eq("id", id).eq("room_code", state.room)
        .then(function(res){ if(res.error) console.error(res.error); });
    }
  }

  function clearDone(){
    var doneIds = state.items.filter(function(i){ return i.done; }).map(function(i){ return i.id; });
    if(doneIds.length === 0) return;
    state.items = state.items.filter(function(i){ return !i.done; });
    render();
    toast("Cleared completed tasks");

    if(sb && state.room){
      sb.from("tasks").delete().eq("room_code", state.room).in("id", doneIds)
        .then(function(res){ if(res.error) console.error(res.error); });
    }
  }

  /* ---------- room / sync lifecycle ---------- */
  function rowToItem(row){
    return { id: row.id, text: row.text, done: !!row.done, createdAt: row.created_at, doneAt: row.done_at };
  }

  function joinRoom(room){
    room = (room || "").trim().toUpperCase();
    if(!room){ toast("Enter a room code first"); return; }

    if(state.channel){
      sb.removeChannel(state.channel);
      state.channel = null;
    }

    state.room = room;
    localStorage.setItem(ROOM_KEY, room);
    document.getElementById("room-code").value = room;
    state.items = loadLocal(room);
    sortItems();
    render();
    state.online = false;
    setSyncUI();

    if(!sb){ toast("Cloud sync unavailable — using local storage only"); return; }

    sb.from("tasks").select("*").eq("room_code", room).then(function(res){
      if(res.error){
        console.error(res.error);
        toast("Could not reach cloud — showing local copy");
        setSyncUI();
        return;
      }
      state.items = res.data.map(rowToItem);
      sortItems();
      render();
      state.online = true;
      setSyncUI();
      toast("Synced to room " + room);

      state.channel = sb.channel("room-" + room)
        .on("postgres_changes",
          { event: "*", schema: "public", table: "tasks", filter: "room_code=eq." + room },
          function(){
            sb.from("tasks").select("*").eq("room_code", room).then(function(res2){
              if(!res2.error){
                state.items = res2.data.map(rowToItem);
                sortItems();
                render();
              }
            });
          })
        .subscribe(function(status){
          state.online = (status === "SUBSCRIBED");
          setSyncUI();
        });
    });
  }

  /* ---------- export / import ---------- */
  function exportJSON(){
    var payload = {
      app: "flow-tasks",
      version: 2,
      room: state.room,
      exportedAt: new Date().toISOString(),
      items: state.items
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "flow-tasks-" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast("Exported .json file");
  }

  function importJSON(file){
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var parsed = JSON.parse(reader.result);
        var incoming = Array.isArray(parsed) ? parsed : parsed.items;
        if(!Array.isArray(incoming)) throw new Error("no items array found");
        incoming = incoming.filter(function(i){ return i && typeof i.text === "string"; })
          .map(function(i){
            return {
              id: i.id || uid(),
              text: i.text,
              done: !!i.done,
              createdAt: i.createdAt || Date.now(),
              doneAt: i.doneAt || null
            };
          });
        state.items = incoming;
        sortItems();
        render();
        toast("Imported " + incoming.length + " item(s)");

        if(sb && state.room && incoming.length){
          var rows = incoming.map(function(i){
            return { id: i.id, room_code: state.room, text: i.text, done: i.done, created_at: i.createdAt, done_at: i.doneAt };
          });
          sb.from("tasks").upsert(rows).then(function(res){
            if(res.error) console.error(res.error);
          });
        }
      }catch(e){
        console.error("Import failed:", e);
        toast("Import failed — invalid file");
      }
    };
    reader.onerror = function(){ toast("Could not read file"); };
    reader.readAsText(file);
  }

  /* ---------- wiring ---------- */
  document.getElementById("add-btn").addEventListener("click", function(){
    var input = document.getElementById("new-item");
    addItem(input.value);
    input.value = "";
    input.focus();
  });
  document.getElementById("new-item").addEventListener("keydown", function(e){
    if(e.key === "Enter"){ addItem(this.value); this.value = ""; }
  });

  document.querySelectorAll(".filters button").forEach(function(btn){
    btn.addEventListener("click", function(){
      document.querySelectorAll(".filters button").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      state.filter = btn.getAttribute("data-filter");
      render();
    });
  });

  document.getElementById("clear-btn").addEventListener("click", clearDone);
  document.getElementById("export-btn").addEventListener("click", exportJSON);
  document.getElementById("import-btn").addEventListener("click", function(){
    document.getElementById("import-input").click();
  });
  document.getElementById("import-input").addEventListener("change", function(e){
    if(e.target.files && e.target.files[0]){
      importJSON(e.target.files[0]);
      e.target.value = "";
    }
  });

  document.getElementById("join-btn").addEventListener("click", function(){
    joinRoom(document.getElementById("room-code").value);
  });
  document.getElementById("room-code").addEventListener("keydown", function(e){
    if(e.key === "Enter") joinRoom(this.value);
  });
  document.getElementById("new-room-btn").addEventListener("click", function(){
    var code = randomRoom();
    document.getElementById("room-code").value = code;
    joinRoom(code);
  });
  document.getElementById("theme-toggle").addEventListener("click", toggleTheme);

  /* ---------- init ---------- */
  initTheme();
  document.getElementById("today-date").textContent = todayStr();

  var savedRoom = localStorage.getItem(ROOM_KEY);
  if(savedRoom){
    joinRoom(savedRoom);
  }else{
    state.items = loadLocal(null);
    sortItems();
    render();
    setSyncUI();
  }

})();
</script>

</body>
</html>
